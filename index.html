<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Simple Whiteboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #333;
      color: white;
      align-items: center;
    }

    canvas {
      display: block;
      background: white;
      cursor: crosshair;
    }

    input, button {
      padding: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #ff4d4d;
      color: white;
    }
  </style>
</head>
<body>

<div class="toolbar">
  Farbe: <input type="color" id="colorPicker" value="#000000">
  Größe: <input type="range" id="brushSize" min="1" max="20" value="3">
  <button onclick="clearCanvas()">Löschen</button>
</div>

<canvas id="board"></canvas>

<script>
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');

  let drawing = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 50;
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  canvas.addEventListener('mousedown', () => drawing = true);
  canvas.addEventListener('mouseup', () => {
    drawing = false;
    ctx.beginPath();
  });
  canvas.addEventListener('mouseout', () => drawing = false);

  canvas.addEventListener('mousemove', draw);

  function draw(e) {
    if (!drawing) return;

    const color = document.getElementById('colorPicker').value;
    const size = document.getElementById('brushSize').value;

    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.strokeStyle = color;

    ctx.lineTo(e.clientX, e.clientY - 50);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.clientX, e.clientY - 50);
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
</script>

</body>
</html>
